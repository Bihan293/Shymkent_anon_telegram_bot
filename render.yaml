services:
  - type: web
    name: shymkent-anon-bot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"
